<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thêm danh mục · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Thêm danh mục</h1>
          <div class="subtitle">Tạo nhóm sản phẩm mới</div>
        </div>
        <a href="/admin/category/list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
      </div>

      <div class="ls-card" style="max-width: 640px;">
        <form id="categoryForm" novalidate>
          <div class="d-flex align-items-center gap-3 mb-4">
            <img id="imagePreview" class="avatar-preview" style="border-radius:10px" src="https://ui-avatars.com/api/?background=2F5FD6&color=fff&name=DM" alt="">
            <div>
              <label class="form-label small text-muted d-block mb-1">Ảnh danh mục</label>
              <input type="file" class="form-control form-control-sm" id="inputFile" accept="image/*">
            </div>
          </div>

          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Tên danh mục <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="name" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Thứ tự hiển thị</label>
              <input type="number" class="form-control" id="displayOrder" value="0">
            </div>
            <div class="col-12">
              <label class="form-label">Slug (dùng cho URL)</label>
              <input type="text" class="form-control" id="slug" placeholder="vd: laptop-gaming">
              <div class="form-text">Để trống sẽ tự tạo từ tên danh mục.</div>
            </div>
            <div class="col-12">
              <label class="form-label">Mô tả ngắn</label>
              <textarea class="form-control" id="description" rows="3" placeholder="vd: Laptop cấu hình cao cho game thủ"></textarea>
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="active" checked>
                <label class="form-check-label" for="active">Hiển thị danh mục này</label>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-ls-accent" id="submitBtn">Lưu danh mục</button>
            <a href="/admin/category/list.html" class="btn btn-outline-secondary">Hủy</a>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>
initAdminLayout('category');

// Hàm chuyển chuỗi thành slug (không dấu, viết thường, thay khoảng trắng bằng dấu gạch ngang)
function slugify(text) {
  return text.toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

document.getElementById('inputFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) document.getElementById('imagePreview').src = URL.createObjectURL(file);
});

document.getElementById('categoryForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!e.target.checkValidity()) { e.target.reportValidity(); return; }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Đang lưu...';

  const name = document.getElementById('name').value;
  const slug = document.getElementById('slug').value.trim() || slugify(name);

  const formData = new FormData();
  formData.append('name', name);
  formData.append('slug', slug);
  formData.append('description', document.getElementById('description').value);
  formData.append('displayOrder', document.getElementById('displayOrder').value || 0);
  formData.append('active', document.getElementById('active').checked);

  const file = document.getElementById('inputFile').files[0];
  if (file) formData.append('inputFile', file);

  try {
    // Gọi API tạo danh mục mới
    await CategoryAPI.create(formData);

    showToast('Đã tạo danh mục thành công.', 'success');
    setTimeout(() => window.location.href = '/admin/category/list.html', 800);
  } catch (err) {
    showToast(err.message, 'danger');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Lưu danh mục';
  }
});
</script>
</body>
</html>
