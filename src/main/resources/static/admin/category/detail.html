<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết danh mục · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Chi tiết danh mục</h1>
          <div class="subtitle" id="subtitleText">Đang tải...</div>
        </div>
        <a href="/admin/category/list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
      </div>

      <div class="ls-card" style="max-width: 560px;" id="detailCard">
        <div class="loading-state"><div class="spinner-border spinner-border-sm text-secondary"></div> Đang tải...</div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>
initAdminLayout('category');
const params = new URLSearchParams(window.location.search);
const categoryId = params.get('id');
if (!categoryId) window.location.href = '/admin/category/list.html';

(async function () {
  try {
    const c = await CategoryAPI.getById(categoryId);
    document.getElementById('subtitleText').textContent = c.slug || c.name;

    document.getElementById('detailCard').innerHTML = `
      <div class="d-flex align-items-center gap-3 mb-4">
        <img class="avatar-preview" style="border-radius:10px" src="${categoryImageUrl(c)}" alt="">
        <div>
          <div class="fs-5 fw-semibold">${c.name}</div>
          ${c.active ? '<span class="role-badge role-admin">Đang hiện</span>' : '<span class="role-badge role-user">Đang ẩn</span>'}
        </div>
      </div>
      <dl class="row mb-0">
        <dt class="col-4 text-muted fw-normal">Slug</dt><dd class="col-8">${c.slug || '—'}</dd>
        <dt class="col-4 text-muted fw-normal">Thứ tự</dt><dd class="col-8">${c.displayOrder}</dd>
        <dt class="col-4 text-muted fw-normal">Mô tả</dt><dd class="col-8">${c.description || '—'}</dd>
      </dl>
      <div class="d-flex gap-2 mt-4">
        <a href="/admin/category/update.html?id=${c.id}" class="btn btn-ls-accent"><i class="bi bi-pencil"></i> Chỉnh sửa</a>
        <button class="btn btn-outline-danger" onclick="handleDelete(${c.id})"><i class="bi bi-trash"></i> Xóa</button>
      </div>
    `;
  } catch (err) {
    document.getElementById('detailCard').innerHTML = `<div class="text-danger">Không tải được: ${err.message}</div>`;
  }
})();

async function handleDelete(id) {
  if (!confirm('Xóa danh mục này?')) return;
  try {
    await CategoryAPI.remove(id);
    showToast('Đã xóa danh mục.', 'success');
    setTimeout(() => window.location.href = '/admin/category/list.html', 600);
  } catch (err) {
    showToast(err.message, 'danger');
  }
}
</script>
</body>
</html>
