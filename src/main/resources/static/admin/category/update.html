<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cập nhật danh mục · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Cập nhật danh mục</h1>
          <div class="subtitle" id="subtitleText">Đang tải thông tin...</div>
        </div>
        <a href="/admin/category/list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
      </div>

      <div class="ls-card" style="max-width: 640px;">
        <form id="categoryForm">
          <div class="d-flex align-items-center gap-3 mb-4">
            <img id="imagePreview" class="avatar-preview" style="border-radius:10px" src="" alt="">
            <div>
              <label class="form-label small text-muted d-block mb-1">Ảnh danh mục</label>
              <input type="file" class="form-control form-control-sm" id="inputFile" accept="image/*">
            </div>
          </div>

          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Tên danh mục</label>
              <input type="text" class="form-control" id="name" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Thứ tự hiển thị</label>
              <input type="number" class="form-control" id="displayOrder">
            </div>
            <div class="col-12">
              <label class="form-label">Slug</label>
              <input type="text" class="form-control" id="slug">
            </div>
            <div class="col-12">
              <label class="form-label">Mô tả ngắn</label>
              <textarea class="form-control" id="description" rows="3"></textarea>
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="active">
                <label class="form-check-label" for="active">Hiển thị danh mục này</label>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-ls-accent" id="submitBtn">Lưu thay đổi</button>
            <a href="/admin/category/list.html" class="btn btn-outline-secondary">Hủy</a>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>
initAdminLayout('category');

const params = new URLSearchParams(window.location.search);
const categoryId = params.get('id');
if (!categoryId) window.location.href = '/admin/category/list.html';

async function init() {
  try {
    const c = await CategoryAPI.getById(categoryId);
    document.getElementById('subtitleText').textContent = c.name;
    document.getElementById('name').value = c.name || '';
    document.getElementById('slug').value = c.slug || '';
    document.getElementById('description').value = c.description || '';
    document.getElementById('displayOrder').value = c.displayOrder || 0;
    document.getElementById('active').checked = !!c.active;
    document.getElementById('imagePreview').src = categoryImageUrl(c);
  } catch (err) {
    showToast('Không tải được thông tin danh mục: ' + err.message, 'danger');
  }
}
init();

document.getElementById('inputFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) document.getElementById('imagePreview').src = URL.createObjectURL(file);
});

document.getElementById('categoryForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Đang lưu...';

  const formData = new FormData();
  formData.append('name', document.getElementById('name').value);
  formData.append('slug', document.getElementById('slug').value);
  formData.append('description', document.getElementById('description').value);
  formData.append('displayOrder', document.getElementById('displayOrder').value || 0);
  formData.append('active', document.getElementById('active').checked);
  const file = document.getElementById('inputFile').files[0];
  if (file) formData.append('inputFile', file);

  try {
    await CategoryAPI.update(categoryId, formData);
    showToast('Đã cập nhật danh mục.', 'success');
    setTimeout(() => window.location.href = '/admin/category/list.html', 800);
  } catch (err) {
    showToast(err.message, 'danger');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Lưu thay đổi';
  }
});
</script>
</body>
</html>
