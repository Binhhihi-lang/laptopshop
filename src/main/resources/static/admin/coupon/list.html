<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mã giảm giá · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Mã giảm giá</h1>
          <div class="subtitle">Quản lý coupon áp dụng cho đơn hàng</div>
        </div>
        <a href="/admin/coupon/create.html" class="btn btn-ls-accent"><i class="bi bi-plus-lg"></i> Thêm coupon</a>
      </div>

      <div class="ls-card">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div class="d-flex gap-2 flex-wrap">
            <input type="search" id="searchInput" class="form-control" style="max-width: 240px" placeholder="Tìm theo mã coupon...">
            <select class="form-select" id="statusFilter" style="max-width: 200px">
              <option value="">Tất cả trạng thái</option>
              <option value="active">Đang hoạt động</option>
              <option value="inactive">Tạm dừng</option>
              <option value="expired">Hết hạn</option>
            </select>
          </div>
          <span class="text-muted small" id="totalCount"></span>
        </div>

        <div id="loadingState" class="loading-state">
          <div class="spinner-border spinner-border-sm text-secondary"></div> Đang tải danh sách...
        </div>
        <div id="emptyState" class="empty-state d-none">
          <i class="bi bi-ticket-perforated fs-1 d-block mb-2"></i>
          Chưa có coupon nào phù hợp.
        </div>
        <div class="table-responsive d-none" id="tableWrap">
          <table class="table ls-table">
            <thead>
              <tr>
                <th>Mã coupon</th>
                <th>Giảm giá</th>
                <th>Hạn sử dụng</th>
                <th>Lượt dùng</th>
                <th>Trạng thái</th>
                <th class="text-end">Thao tác</th>
              </tr>
            </thead>
            <tbody id="couponTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>
initAdminLayout('coupon');

let allCoupons = [];

function isExpired(c) {
  return !!c.expiryDate && new Date(c.expiryDate) < new Date(new Date().toDateString());
}

function statusBadge(c) {
  if (isExpired(c)) return '<span class="role-badge role-user">Hết hạn</span>';
  return c.active
    ? '<span class="role-badge role-admin">Đang hoạt động</span>'
    : '<span class="role-badge role-user">Tạm dừng</span>';
}

function renderRows(coupons) {
  const body = document.getElementById('couponTableBody');
  body.innerHTML = coupons.map(c => `
    <tr>
      <td><span class="fw-semibold">${c.code}</span></td>
      <td>${formatDiscount(c)}</td>
      <td>${formatDate(c.expiryDate)}</td>
      <td>${c.usedCount ?? 0}${c.usageLimit ? ' / ' + c.usageLimit : ' (không giới hạn)'}</td>
      <td>${statusBadge(c)}</td>
      <td class="text-end">
        <a href="/admin/coupon/detail.html?id=${c.id}" class="btn btn-sm btn-outline-secondary" title="Xem"><i class="bi bi-eye"></i></a>
        <a href="/admin/coupon/update.html?id=${c.id}" class="btn btn-sm btn-outline-secondary" title="Sửa"><i class="bi bi-pencil"></i></a>
        <button class="btn btn-sm btn-outline-danger" title="Xóa" onclick="handleDelete(${c.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

async function handleDelete(id) {
  if (!confirm('Xóa coupon này? Hành động không thể hoàn tác.')) return;
  try {
    await CouponAPI.remove(id);
    showToast('Đã xóa coupon.', 'success');
    allCoupons = allCoupons.filter(c => c.id !== id);
    applyFilter();
  } catch (err) {
    showToast("Có lỗi: " + err.message, 'danger');
  }
}

// lọc danh sách coupon theo ô tìm kiếm và trạng thái
function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const status = document.getElementById('statusFilter').value;

  let filtered = allCoupons;
  if (q) {
    filtered = filtered.filter(c => (c.code || '').toLowerCase().includes(q));
  }
  if (status === 'active') {
    filtered = filtered.filter(c => c.active && !isExpired(c));
  } else if (status === 'inactive') {
    filtered = filtered.filter(c => !c.active && !isExpired(c));
  } else if (status === 'expired') {
    filtered = filtered.filter(c => isExpired(c));
  }

  document.getElementById('totalCount').textContent = `${filtered.length} coupon`;
  document.getElementById('emptyState').classList.toggle('d-none', filtered.length > 0);
  document.getElementById('tableWrap').classList.toggle('d-none', filtered.length === 0);

  renderRows(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilter);
document.getElementById('statusFilter').addEventListener('change', applyFilter);

async function init() {
  try {
    allCoupons = await CouponAPI.getAll();
    document.getElementById('loadingState').classList.add('d-none');
    applyFilter();
  } catch (err) {
    document.getElementById('loadingState').classList.add('d-none');
    showToast("Có lỗi: " + err.message, 'danger');
  }
}
init();
</script>
</body>
</html>
