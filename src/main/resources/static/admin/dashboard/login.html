<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập · Laptopshop Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/admin-style.css">
</head>

<body
  style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--ls-bg, #f5f6f8);">

  <div class="ls-card" style="width:100%; max-width:380px;">
    <h4 class="mb-1" style="font-family: var(--font-display);">Đăng nhập</h4>
    <div class="text-muted small mb-4">Khu vực quản trị Laptopshop</div>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-ls-accent w-100" id="submitBtn">Đăng nhập</button>
    </form>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/scripts.js"></script>
  <script src="/js/admin-api.js"></script>
  <script>
    // Nếu đã có token sẵn rồi thì vào thẳng dashboard, khỏi bắt đăng nhập lại
    if (localStorage.getItem('accessToken')) {
      window.location.href = '/admin/dashboard/show.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!e.target.checkValidity()) { e.target.reportValidity(); return; }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Đang đăng nhập...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const result = await AuthAPI.login(email, password);
        localStorage.setItem('accessToken', result.token);
        window.location.href = '/admin/dashboard/show.html';
      } catch (err) {
        showToast(err.message, 'danger');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>

</html>
