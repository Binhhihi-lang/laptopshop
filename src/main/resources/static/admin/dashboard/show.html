<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tổng quan · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Tổng quan</h1>
          <div class="subtitle">Số liệu nhanh về cửa hàng của bạn</div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-lg-3">
          <div class="ls-card stat-card">
            <div class="stat-icon stat-icon-users"><i class="bi bi-people"></i></div>
            <div class="stat-value" id="statUsers">—</div>
            <div class="stat-label">Người dùng</div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="ls-card stat-card">
            <div class="stat-icon stat-icon-products"><i class="bi bi-laptop"></i></div>
            <div class="stat-value" id="statProducts">—</div>
            <div class="stat-label">Sản phẩm</div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="ls-card stat-card">
            <div class="stat-icon stat-icon-orders"><i class="bi bi-receipt"></i></div>
            <div class="stat-value" id="statOrders">—</div>
            <div class="stat-label">Đơn hàng</div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="ls-card stat-card">
            <div class="stat-icon stat-icon-admins"><i class="bi bi-shield-check"></i></div>
            <div class="stat-value" id="statAdmins">—</div>
            <div class="stat-label">Quản trị viên</div>
          </div>
        </div>
      </div>

      <div class="ls-card">
        <h5 class="mb-3" style="font-family: var(--font-display);">Truy cập nhanh</h5>
        <div class="d-flex flex-wrap gap-2">
          <a href="/admin/user/list.html" class="btn btn-outline-secondary"><i class="bi bi-people"></i> Quản lý người dùng</a>
          <a href="/admin/user/create.html" class="btn btn-outline-secondary"><i class="bi bi-person-plus"></i> Thêm người dùng</a>
          <a href="/admin/product/list.html" class="btn btn-outline-secondary disabled" tabindex="-1" aria-disabled="true"><i class="bi bi-laptop"></i> Quản lý sản phẩm (sắp có)</a>
          <a href="/admin/order/list.html" class="btn btn-outline-secondary disabled" tabindex="-1" aria-disabled="true"><i class="bi bi-receipt"></i> Quản lý đơn hàng (sắp có)</a>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>


initAdminLayout('dashboard');

(async function loadStats() {
  try {
    // File admin-api.js thực hiện một Request ngầm (AJAX) gọi đến endpoint @RestController của Java (ví dụ: GET /api/v1/users).
    // Xử lý bất đồng bộ với Fetch API (Async / Await)
    const users = await UserAPI.getAll();

    document.getElementById('statUsers').textContent = users.length;

    const adminCount = users.filter(u => u.role && u.role.name && u.role.name.toUpperCase().includes('ADMIN')).length;
    const userCount = users.length - adminCount;

    // in số liệu ra các thẻ HTML
    document.getElementById('statUsers').textContent = userCount;
    document.getElementById('statAdmins').textContent = adminCount;

  } catch (err) {

    document.getElementById('statUsers').textContent = '?';
    document.getElementById('statAdmins').textContent = '?';
    showToast('Không tải được số liệu người dùng: ' + err.message, 'danger');
  }

  // Product/Order chưa có Service/API hoàn chỉnh -> để placeholder, cập nhật sau khi xong module đó.
  document.getElementById('statProducts').textContent = '--';
  document.getElementById('statOrders').textContent = '--';
})();
</script>
</body>
</html>
