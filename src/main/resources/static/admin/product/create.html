<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thêm sản phẩm · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Thêm sản phẩm</h1>
          <div class="subtitle">Thêm laptop mới vào cửa hàng</div>
        </div>
        <a href="/admin/product/list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
      </div>

      <form id="productForm" novalidate>
        <div class="row g-3" style="max-width: 900px;">
          <div class="col-12">
            <div class="ls-card">
              <h6 class="mb-3" style="font-family: var(--font-display);">Ảnh sản phẩm</h6>
              <div class="d-flex align-items-center gap-3">
                <img id="imagePreview" class="avatar-preview" style="border-radius:10px" src="https://ui-avatars.com/api/?background=6B7280&color=fff&name=SP" alt="">
                <input type="file" class="form-control form-control-sm" id="inputFile" accept="image/*" style="max-width:280px">
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="ls-card">
              <h6 class="mb-3" style="font-family: var(--font-display);">Thông tin cơ bản</h6>
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label">Mã SKU <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="code" required placeholder="vd: IP15PM-256">
                </div>
                <div class="col-md-8">
                  <label class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="name" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Danh mục</label>
                  <select class="form-select" id="categoryId"></select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Giá bán (đ) <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="price" required min="0" step="1000">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Số lượng tồn kho</label>
                  <input type="number" class="form-control" id="quantity" value="0" min="0">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Hãng sản xuất</label>
                  <input type="text" class="form-control" id="factory" placeholder="vd: Apple, Dell, Asus...">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Đối tượng sử dụng</label>
                  <input type="text" class="form-control" id="target" placeholder="vd: Gaming, Văn phòng, Đồ họa...">
                </div>
                <div class="col-12">
                  <label class="form-label">Mô tả ngắn</label>
                  <input type="text" class="form-control" id="shortDesc" placeholder="Hiển thị ở danh sách sản phẩm">
                </div>
                <div class="col-12">
                  <label class="form-label">Mô tả chi tiết</label>
                  <textarea class="form-control" id="detailDesc" rows="4"></textarea>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="ls-card">
              <h6 class="mb-3" style="font-family: var(--font-display);">Cấu hình laptop</h6>
              <div class="row g-3">
                <div class="col-md-4"><label class="form-label">CPU</label><input type="text" class="form-control" id="cpu" placeholder="vd: Apple M3 Pro"></div>
                <div class="col-md-4"><label class="form-label">RAM</label><input type="text" class="form-control" id="ram" placeholder="vd: 16GB"></div>
                <div class="col-md-4"><label class="form-label">Ổ cứng</label><input type="text" class="form-control" id="storage" placeholder="vd: 512GB SSD"></div>
                <div class="col-md-4"><label class="form-label">Card đồ họa (GPU)</label><input type="text" class="form-control" id="gpu" placeholder="vd: RTX 4060"></div>
                <div class="col-md-4"><label class="form-label">Màn hình</label><input type="text" class="form-control" id="screen" placeholder='vd: 15.6" FHD 144Hz'></div>
                <div class="col-md-4"><label class="form-label">Hệ điều hành</label><input type="text" class="form-control" id="os" placeholder="vd: Windows 11"></div>
                <div class="col-md-4"><label class="form-label">Trọng lượng (kg)</label><input type="number" class="form-control" id="weight" step="0.1" min="0"></div>
                <div class="col-md-4"><label class="form-label">Bảo hành (tháng)</label><input type="number" class="form-control" id="warrantyMonths" min="0"></div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="ls-card">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="active" checked>
                <label class="form-check-label" for="active">Đang bán (hiển thị cho khách)</label>
              </div>
            </div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-ls-accent" id="submitBtn">Lưu sản phẩm</button>
            <a href="/admin/product/list.html" class="btn btn-outline-secondary">Hủy</a>
          </div>
        </div>
      </form>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin-guard.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>
initAdminLayout('product');

(async function loadCategories() {
  try {
    const categories = await CategoryAPI.getAll();

    const select = document.getElementById('categoryId');

    select.innerHTML = '<option value="">-- Chọn danh mục --</option>' +
      categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  } catch (err) {
    showToast('Không tải được danh sách danh mục: ' + err.message, 'danger');
  }
})();

// Khi người dùng chọn file ảnh, hiển thị preview
document.getElementById('inputFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) document.getElementById('imagePreview').src = URL.createObjectURL(file);
});

// Khi người dùng submit form, gửi dữ liệu lên server
document.getElementById('productForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!e.target.checkValidity()) { e.target.reportValidity(); return; }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Đang lưu...';

  const formData = new FormData();

  // 1. Gom tất cả các trường text lồng vào 1 đối tượng
  const productData = {
    code: document.getElementById('code').value,
    name: document.getElementById('name').value,
    price: document.getElementById('price').value,
    quantity: document.getElementById('quantity').value || 0,
    factory: document.getElementById('factory').value,
    target: document.getElementById('target').value,
    shortDesc: document.getElementById('shortDesc').value,
    detailDesc: document.getElementById('detailDesc').value,
    cpu: document.getElementById('cpu').value,
    ram: document.getElementById('ram').value,
    storage: document.getElementById('storage').value,
    gpu: document.getElementById('gpu').value,
    screen: document.getElementById('screen').value,
    os: document.getElementById('os').value,
    weight: document.getElementById('weight').value || 0,
    warrantyMonths: document.getElementById('warrantyMonths').value || 0,
    active: document.getElementById('active').checked

  };


  const categoryId = document.getElementById('categoryId').value;
  if (categoryId) productData.category = { id: categoryId };

  // Append chuỗi JSON này vào (Tính là 1 part)
  formData.append("productInfo", new Blob([JSON.stringify(productData)], {
    type: "application/json"
  }));

  const file = document.getElementById('inputFile').files[0];
  if (file) formData.append('inputFile', file);

  try {
    
    await ProductAPI.create(formData);

    showToast('Đã tạo sản phẩm thành công.', 'success');
    setTimeout(() => window.location.href = '/admin/product/list.html', 800);
  } catch (err) {
    showToast(err.message, 'danger');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Lưu sản phẩm';
  }
});
</script>
</body>
</html>
