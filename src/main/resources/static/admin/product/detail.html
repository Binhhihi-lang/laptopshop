<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Chi tiết sản phẩm</h1>
          <div class="subtitle" id="subtitleText">Đang tải...</div>
        </div>
        <a href="/admin/product/list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
      </div>

      <div class="row g-3" style="max-width: 900px;" id="detailWrap">
        <div class="col-12">
          <div class="ls-card">
            <div class="loading-state"><div class="spinner-border spinner-border-sm text-secondary"></div> Đang tải...</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin-guard.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>
initAdminLayout('product');
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
if (!productId) window.location.href = '/admin/product/list.html';

function specRow(label, value) {
  return `<dt class="col-5 text-muted fw-normal">${label}</dt><dd class="col-7">${value || '—'}</dd>`;
}

(async function () {
  try {
    const p = await ProductAPI.getById(productId);
    document.getElementById('subtitleText').textContent = p.code || p.name;

    document.getElementById('detailWrap').innerHTML = `
      <div class="col-12">
        <div class="ls-card d-flex align-items-center gap-3">
          <img class="avatar-preview" style="border-radius:10px" src="${productImageUrl(p)}" alt="">
          <div>
            <div class="fs-5 fw-semibold">${p.name}</div>
            <div class="text-muted small mb-1">${p.code || ''} ${p.category ? '· ' + p.category.name : ''}</div>
            <div class="fs-5 fw-semibold" style="color: var(--ls-accent-dark);">${formatCurrency(p.price)}</div>
            ${p.active ? '<span class="role-badge role-admin">Đang bán</span>' : '<span class="role-badge role-user">Ngừng bán</span>'}
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="ls-card h-100">
          <h6 class="mb-3" style="font-family: var(--font-display);">Thông tin chung</h6>
          <dl class="row mb-0">
            ${specRow('Tồn kho', p.quantity)}
            ${specRow('Đã bán', p.sold)}
            ${specRow('Hãng', p.factory)}
            ${specRow('Đối tượng', p.target)}
            ${specRow('Mô tả ngắn', p.shortDesc)}
          </dl>
        </div>
      </div>
      <div class="col-md-6">
        <div class="ls-card h-100">
          <h6 class="mb-3" style="font-family: var(--font-display);">Cấu hình</h6>
          <dl class="row mb-0">
            ${specRow('CPU', p.cpu)}
            ${specRow('RAM', p.ram)}
            ${specRow('Ổ cứng', p.storage)}
            ${specRow('GPU', p.gpu)}
            ${specRow('Màn hình', p.screen)}
            ${specRow('Hệ điều hành', p.os)}
            ${specRow('Trọng lượng', p.weight ? p.weight + ' kg' : null)}
            ${specRow('Bảo hành', p.warrantyMonths ? p.warrantyMonths + ' tháng' : null)}
          </dl>
        </div>
      </div>
      <div class="col-12">
        <div class="ls-card">
          <h6 class="mb-2" style="font-family: var(--font-display);">Mô tả chi tiết</h6>
          <p class="mb-0 text-muted">${p.detailDesc || '—'}</p>
        </div>
      </div>
      <div class="col-12 d-flex gap-2">
        <a href="/admin/product/update.html?id=${p.id}" class="btn btn-ls-accent"><i class="bi bi-pencil"></i> Chỉnh sửa</a>
        <button class="btn btn-outline-danger" onclick="handleDelete(${p.id})"><i class="bi bi-trash"></i> Xóa</button>
      </div>
    `;
  } catch (err) {
    document.getElementById('detailWrap').innerHTML = `<div class="col-12"><div class="text-danger">Có lỗi: ${err.message}</div></div>`;
  }
})();

async function handleDelete(id) {
  if (!confirm('Xóa sản phẩm này? Hành động không thể hoàn tác.')) return;
  try {
    await ProductAPI.remove(id);
    showToast('Đã xóa sản phẩm.', 'success');
    setTimeout(() => window.location.href = '/admin/product/list.html', 600);
  } catch (err) {
    showToast(err.message, 'danger');
  }
}
</script>
</body>
</html>
