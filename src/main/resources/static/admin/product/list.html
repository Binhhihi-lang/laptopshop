<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sản phẩm · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Sản phẩm</h1>
          <div class="subtitle">Quản lý laptop đang bán trong cửa hàng</div>
        </div>
        <a href="/admin/product/create.html" class="btn btn-ls-accent"><i class="bi bi-plus-lg"></i> Thêm sản phẩm</a>
      </div>

      <div class="ls-card">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div class="d-flex gap-2 flex-wrap">
            <input type="search" id="searchInput" class="form-control" style="max-width: 240px" placeholder="Tìm theo tên hoặc mã SKU...">
            <select class="form-select" id="categoryFilter" style="max-width: 200px">
              <option value="">Tất cả danh mục</option>
            </select>
          </div>
          <span class="text-muted small" id="totalCount"></span>
        </div>

        <div id="loadingState" class="loading-state">
          <div class="spinner-border spinner-border-sm text-secondary"></div> Đang tải danh sách...
        </div>
        <div id="emptyState" class="empty-state d-none">
          <i class="bi bi-laptop fs-1 d-block mb-2"></i>
          Chưa có sản phẩm nào phù hợp.
        </div>
        <div class="table-responsive d-none" id="tableWrap">
          <table class="table ls-table">
            <thead>
              <tr>
                <th></th>
                <th>Sản phẩm</th>
                <th>Danh mục</th>
                <th>Giá</th>
                <th>Kho</th>
                <th>Trạng thái</th>
                <th class="text-end">Thao tác</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>
initAdminLayout('product');

let allProducts = [];

function statusBadge(active) {
  return active
    ? '<span class="role-badge role-admin">Đang bán</span>'
    : '<span class="role-badge role-user">Ngừng bán</span>';
}

function renderRows(products) {
  const body = document.getElementById('productTableBody');
  body.innerHTML = products.map(p => `
    <tr>
      <td><img class="avatar-thumb" style="border-radius:6px" src="${productImageUrl(p)}" alt=""></td>
      <td>
        <div class="fw-semibold">${p.name}</div>
        <div class="text-muted small">${p.code || ''}</div>
      </td>
      <td>${p.category ? p.category.name : '<span class="text-muted">Chưa gán</span>'}</td>
      <td>${formatCurrency(p.price)}</td>
      <td>${p.quantity}</td>
      <td>${statusBadge(p.active)}</td>
      <td class="text-end">
        <a href="/admin/product/detail.html?id=${p.id}" class="btn btn-sm btn-outline-secondary" title="Xem"><i class="bi bi-eye"></i></a>
        <a href="/admin/product/update.html?id=${p.id}" class="btn btn-sm btn-outline-secondary" title="Sửa"><i class="bi bi-pencil"></i></a>
        <button class="btn btn-sm btn-outline-danger" title="Xóa" onclick="handleDelete(${p.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

async function handleDelete(id) {
  if (!confirm('Xóa sản phẩm này? Hành động không thể hoàn tác.')) return;
  try {
    await ProductAPI.remove(id);
    showToast('Đã xóa sản phẩm.', 'success');
    allProducts = allProducts.filter(p => p.id !== id);
    applyFilter();
  } catch (err) {
    showToast(err.message, 'danger');
  }
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const categoryId = document.getElementById('categoryFilter').value;

  let filtered = allProducts;
  if (q) {
    filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(q) || (p.code || '').toLowerCase().includes(q));
  }
  if (categoryId) {
    filtered = filtered.filter(p => p.category && String(p.category.id) === categoryId);
  }

  document.getElementById('totalCount').textContent = `${filtered.length} sản phẩm`;
  document.getElementById('emptyState').classList.toggle('d-none', filtered.length > 0);
  document.getElementById('tableWrap').classList.toggle('d-none', filtered.length === 0);
  renderRows(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilter);
document.getElementById('categoryFilter').addEventListener('change', applyFilter);

async function init() {
  try {
    const [products, categories] = await Promise.all([ProductAPI.getAll(), CategoryAPI.getAll()]);
    allProducts = products;

    const select = document.getElementById('categoryFilter');
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      select.appendChild(opt);
    });

    document.getElementById('loadingState').classList.add('d-none');
    applyFilter();
  } catch (err) {
    document.getElementById('loadingState').classList.add('d-none');
    showToast('Không tải được danh sách sản phẩm: ' + err.message, 'danger');
  }
}
init();
</script>
</body>
</html>
