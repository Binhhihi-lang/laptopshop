<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết người dùng · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Chi tiết người dùng</h1>
          <div class="subtitle" id="subtitleText">Đang tải...</div>
        </div>
        <a href="/admin/user/list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
      </div>

      <div class="ls-card" style="max-width: 560px;" id="detailCard">
        <div class="loading-state"><div class="spinner-border spinner-border-sm text-secondary"></div> Đang tải...</div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin-guard.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>
<script>
initAdminLayout('user');
const params = new URLSearchParams(window.location.search);
const userId = params.get('id');
if (!userId) window.location.href = '/admin/user/list.html';

(async function () {
  try {
    const u = await UserAPI.getById(userId);
    document.getElementById('subtitleText').textContent = u.email;
    const roleName = u.role ? u.role.name : 'Chưa gán';
    const roleClass = roleName.toUpperCase().includes('ADMIN') ? 'role-admin' : 'role-user';

    document.getElementById('detailCard').innerHTML = `
      <div class="d-flex align-items-center gap-3 mb-4">
        <img class="avatar-preview" src="${avatarUrl(u)}" alt="">
        <div>
          <div class="fs-5 fw-semibold">${u.fullName || '(chưa đặt tên)'}</div>
          <span class="role-badge ${roleClass}">${roleName}</span>
        </div>
      </div>
      <dl class="row mb-0">
        <dt class="col-4 text-muted fw-normal">Email</dt><dd class="col-8">${u.email}</dd>
        <dt class="col-4 text-muted fw-normal">Số điện thoại</dt><dd class="col-8">${u.phone || '—'}</dd>
        <dt class="col-4 text-muted fw-normal">Địa chỉ</dt><dd class="col-8">${u.address || '—'}</dd>
      </dl>
      <div class="d-flex gap-2 mt-4">
        <a href="/admin/user/update.html?id=${u.id}" class="btn btn-ls-accent"><i class="bi bi-pencil"></i> Chỉnh sửa</a>
        <button class="btn btn-outline-danger" onclick="handleDelete(${u.id})"><i class="bi bi-trash"></i> Xóa</button>
      </div>
    `;
  } catch (err) {
    document.getElementById('detailCard').innerHTML = `<div class="text-danger">Không tải được: ${err.message}</div>`;
  }
})();

async function handleDelete(id) {
  if (!confirm('Xóa người dùng này? Hành động không thể hoàn tác.')) return;
  try {
    await UserAPI.remove(id);
    showToast('Đã xóa người dùng.', 'success');
    setTimeout(() => window.location.href = '/admin/user/list.html', 600);
  } catch (err) {
    showToast(err.message, 'danger');
  }
}
</script>
</body>
</html>
