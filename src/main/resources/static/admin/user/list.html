<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Người dùng · Laptopshop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>
  <div class="admin-content-col">
    <div id="header-placeholder"></div>
    <main class="admin-main">
      <div class="admin-page-title">
        <div>
          <h1>Người dùng</h1>
          <div class="subtitle">Quản lý tài khoản khách hàng &amp; quản trị viên</div>
        </div>
        <a href="/admin/user/create.html" class="btn btn-ls-accent"><i class="bi bi-plus-lg"></i> Thêm người dùng</a>
      </div>

      <div class="ls-card">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <input type="search" id="searchInput" class="form-control" style="max-width: 280px" placeholder="Tìm theo tên hoặc email...">
          <span class="text-muted small" id="totalCount"></span>
        </div>

        <div id="loadingState" class="loading-state">
          <div class="spinner-border spinner-border-sm text-secondary"></div> Đang tải danh sách...
        </div>
        <div id="emptyState" class="empty-state d-none">
          <i class="bi bi-people fs-1 d-block mb-2"></i>
          Chưa có người dùng nào phù hợp.
        </div>
        <div class="table-responsive d-none" id="tableWrap">
          <table class="table ls-table">
            <thead>
              <tr>
                <th></th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Số điện thoại</th>
                <th>Vai trò</th>
                <th class="text-end">Thao tác</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin-guard.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/admin-api.js"></script>

// lấy danh sách người dùng từ API và hiển thị lên bảng
<script>
initAdminLayout('user');

let allUsers = [];

function roleBadgeHtml(user) {
  const roleName = user.role ? user.role.name : null;
  if (!roleName) return '<span class="role-badge role-user">Chưa gán</span>';
  const cls = roleName.toUpperCase().includes('ADMIN') ? 'role-admin' : 'role-user';
  return `<span class="role-badge ${cls}">${roleName}</span>`;
}

// render các hàng trong bảng
function renderRows(users) {
  const body = document.getElementById('userTableBody');
  body.innerHTML = users.map(u => `
    <tr>
      <td><img class="avatar-thumb" src="${avatarUrl(u)}" alt=""></td>
      <td>${u.fullName || '(chưa đặt tên)'}</td>
      <td>${u.email}</td>
      <td>${u.phone || '—'}</td>
      <td>${roleBadgeHtml(u)}</td>
      <td class="text-end">
        <a href="/admin/user/detail.html?id=${u.id}" class="btn btn-sm btn-outline-secondary" title="Xem"><i class="bi bi-eye"></i></a>
        <a href="/admin/user/update.html?id=${u.id}" class="btn btn-sm btn-outline-secondary" title="Sửa"><i class="bi bi-pencil"></i></a>
        <button class="btn btn-sm btn-outline-danger" title="Xóa" onclick="handleDelete(${u.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

// xóa người dùng
async function handleDelete(id) {
  if (!confirm('Xóa người dùng này? Hành động không thể hoàn tác.')) return;
  try {
    await UserAPI.remove(id);
    showToast('Đã xóa người dùng.', 'success');
    allUsers = allUsers.filter(u => u.id !== id);
    applyFilter();
  } catch (err) {
    showToast(err.message, 'danger');
  }
}

// lọc danh sách người dùng theo tên hoặc email
function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q
    ? allUsers.filter(u => (u.fullName || '').toLowerCase().includes(q) || u.email.toLowerCase().includes(q))
    : allUsers;
  document.getElementById('totalCount').textContent = `${filtered.length} người dùng`;
  document.getElementById('emptyState').classList.toggle('d-none', filtered.length > 0);
  document.getElementById('tableWrap').classList.toggle('d-none', filtered.length === 0);
  renderRows(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilter);

(async function init() {
  try {
    allUsers = await UserAPI.getAll();
    document.getElementById('loadingState').classList.add('d-none');
    applyFilter();
  } catch (err) {
    document.getElementById('loadingState').classList.add('d-none');
    showToast('Không tải được danh sách người dùng: ' + err.message, 'danger');
  }
})();
</script>
</body>
</html>
