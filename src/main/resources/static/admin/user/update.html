<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cập nhật người dùng · Laptopshop Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/admin-style.css">
</head>

<body>
  <div class="admin-shell">
    <div id="sidebar-placeholder"></div>
    <div class="admin-content-col">
      <div id="header-placeholder"></div>
      <main class="admin-main">
        <div class="admin-page-title">
          <div>
            <h1>Cập nhật người dùng</h1>
            <div class="subtitle" id="subtitleText">Đang tải thông tin...</div>
          </div>
          <a href="/admin/user/list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay
            lại</a>
        </div>

        <div class="ls-card" style="max-width: 640px;">
          <form id="userForm">
            <div class="d-flex align-items-center gap-3 mb-4">
              <img id="avatarPreview" class="avatar-preview" src="" alt="">
              <div>
                <label class="form-label small text-muted d-block mb-1">Ảnh đại diện</label>
                <input type="file" class="form-control form-control-sm" id="inputFile" accept="image/*">
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
              </div>
              <div class="col-md-6">
                <label class="form-label">Họ và tên</label>
                <input type="text" class="form-control" id="fullName">
              </div>
              <div class="col-md-6">
                <label class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" id="phone">
              </div>
              <div class="col-md-6">
                <label class="form-label">Vai trò</label>
                <select class="form-select" id="roleName"></select>
              </div>
              <div class="col-12">
                <label class="form-label">Địa chỉ</label>
                <input type="text" class="form-control" id="address">
              </div>
            </div>

            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-ls-accent" id="submitBtn">Lưu thay đổi</button>
              <a href="/admin/user/list.html" class="btn btn-outline-secondary">Hủy</a>
            </div>
          </form>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/scripts.js"></script>
  <script src="/js/admin-api.js"></script>
  <script>
    initAdminLayout('user');

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');
    if (!userId) window.location.href = '/admin/user/list.html';

    async function init() {
      try {
        const roles = await RoleAPI.getAll();
        document.getElementById('roleName').innerHTML = roles.map(r => `<option value="${r.name}">${r.name}</option>`).join('');

        const user = await UserAPI.getById(userId);
        document.getElementById('subtitleText').textContent = user.email;
        document.getElementById('email').value = user.email;
        document.getElementById('fullName').value = user.fullName || '';
        document.getElementById('phone').value = user.phone || '';
        document.getElementById('address').value = user.address || '';
        document.getElementById('roleName').value = user.role ? user.role.name : '';
        document.getElementById('avatarPreview').src = avatarUrl(user); // hàm helper avatatURL 
      } catch (err) {
        showToast('Không tải được thông tin người dùng: ' + err.message, 'danger');
      }
    }
    init();

    document.getElementById('inputFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) document.getElementById('avatarPreview').src = URL.createObjectURL(file);
    });

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Đang lưu...';

      const formData = new FormData();
      formData.append('email', document.getElementById('email').value);
      formData.append('fullName', document.getElementById('fullName').value);
      formData.append('phone', document.getElementById('phone').value);
      formData.append('address', document.getElementById('address').value);
      formData.append('roleName', document.getElementById('roleName').value);

      const file = document.getElementById('inputFile').files[0];
      if (file) formData.append('inputFile', file);

      try {
        console.log(formData);
        await UserAPI.update(userId, formData);
        showToast('Đã cập nhật người dùng.', 'success');
        setTimeout(() => window.location.href = '/admin/user/list.html', 800);
      } catch (err) {
        showToast(err.message, 'danger');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Lưu thay đổi';
      }
    });
  </script>
</body>

</html>
